<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sio Cars — Connexion</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="public/css/siocars.css">
</head>
<body class="sc-body-f1">
  <div class="sc-f1-hud" aria-hidden="true">
    <div class="sc-f1-hud__timing"></div>
    <div class="sc-f1-hud__telemetry"></div>
    <div class="sc-f1-hud__labels"><span>S1</span><span>S2</span><span>S3</span></div>
  </div>
  <div class="sc-login position-relative overflow-hidden min-vh-100">
    <div class="sc-login__glow" aria-hidden="true"></div>
    <div class="sc-login__speed" aria-hidden="true"></div>
    <div class="sc-login__grid position-absolute top-0 start-0 w-100 h-100" aria-hidden="true"></div>
    <div class="min-vh-100 d-flex align-items-center justify-content-center p-4 position-relative">
      <div class="w-100" style="max-width: 440px;">
        <div class="sc-login-card p-4 p-md-5">
          <div class="text-center mb-4">
            <img src="public/images/siocars-logo.svg" alt="Sio Cars — logo voiture" class="sc-brand-logo sc-animate-float mb-3" width="120" height="120" decoding="async">
            <h1 class="h4 fw-bold text-white mb-1" style="letter-spacing:-0.02em;">Sio Cars</h1>
            <p class="text-sc-muted small mb-0">Espace pro — accès sécurisé au parc &amp; clients</p>
          </div>
          <form id="login-form" novalidate>
            <div class="mb-3">
              <label for="login-user" class="form-label">Identifiant</label>
              <input type="text" class="form-control" id="login-user" name="username" autocomplete="username" required value="admin">
            </div>
            <div class="mb-3">
              <label for="login-pass" class="form-label">Mot de passe</label>
              <input type="password" class="form-control" id="login-pass" name="password" autocomplete="current-password" required value="admin">
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg sc-btn-cta">
              <i class="bi bi-key-fill me-2"></i>Accéder à l’espace concession
            </button>
            <p id="login-error" class="text-warning small fw-semibold mt-3 mb-0 d-none" role="alert"></p>
          </form>
          <div class="sc-login-trust" aria-hidden="true">
            <span><i class="bi bi-shield-check me-1"></i> Données démo</span>
            <span><i class="bi bi-speedometer2 me-1"></i> Parc synchronisé</span>
            <span><i class="bi bi-award me-1"></i> CRM BTS SIO</span>
          </div>
          <p class="text-sc-muted small text-center mt-4 mb-0">Démo : <code class="text-light">admin</code> / <code class="text-light">admin</code></p>
          <p class="text-sc-muted small text-center mt-2 mb-0">Modules sur <strong>pages séparées</strong>, ouverts depuis le tableau de bord.</p>
        </div>
      </div>
    </div>
  </div>
  <script src="public/js/siocars-auth.js"></script>
  <script src="public/js/siocars-login.js"></script>
</body>
</html>
